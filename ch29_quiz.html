        } catch (error) {}

        try {
            const windowNameData = JSON.parse(window.name || '{}');
            if (windowNameData && Object.prototype.hasOwnProperty.call(windowNameData, storageKey)) {
                return windowNameData[storageKey];
            }
        } catch (error) {}

        return '[]';
    }

    function writePersistentValue(storageKey, serializedValue) {
        try {
            localStorage.setItem(storageKey, serializedValue);
            return;
        } catch (error) {}

        try {
            sessionStorage.setItem(storageKey, serializedValue);
            return;
        } catch (error) {}

        try {
            const windowNameData = JSON.parse(window.name || '{}');
            windowNameData[storageKey] = serializedValue;
            window.name = JSON.stringify(windowNameData);
        } catch (error) {}
    }

    function loadFlaggedList(storageKey) {
        try {
            const parsedValue = JSON.parse(readPersistentValue(storageKey));
            return Array.isArray(parsedValue) ? parsedValue : [];
        } catch (error) {
            return [];
        }
    }

    function saveFlaggedList(storageKey, values) {
        writePersistentValue(storageKey, JSON.stringify(values));
    }

    let flaggedQuestions = loadFlaggedList('flagged_chapter29');
    let currentFilter = 'all';

    // 渲染題目清單
    function renderQuestions() {
        const listContainer = document.getElementById('q-list');
        listContainer.innerHTML = '';

        questionsData.forEach(item => {
            const isFlagged = flaggedQuestions.includes(item.id);
            
            // 上方切換篩選邏輯
            if (currentFilter === 'flagged' && !isFlagged) return;

            const card = document.createElement('div');
            card.className = `question-card ${isFlagged ? 'flagged' : ''}`;
            card.id = `card-${item.id}`;

            // 題號
            const numDiv = document.createElement('div');
            numDiv.className = 'q-num';
            numDiv.innerText = `${item.id}.`;

            // 旗標按鈕
            const flagBtn = document.createElement('button');
            flagBtn.className = 'flag-btn';
            flagBtn.innerHTML = isFlagged ? '🚩' : '🏳️';
            flagBtn.title = isFlagged ? "取消標記" : "標記為容易出錯";
            flagBtn.onclick = () => toggleFlag(item.id);

            // 答案隱藏區塊
            const ansDiv = document.createElement('div');
            ansDiv.className = 'answer-box';
            ansDiv.innerText = item.ans;

            // 題目與選項容器
            const bodyDiv = document.createElement('div');
            bodyDiv.className = 'q-body';

            const textDiv = document.createElement('div');
            textDiv.className = 'q-text';
            textDiv.innerText = item.q;

            const optsGrid = document.createElement('div');
            optsGrid.className = 'options-grid';
            item.opts.forEach(opt => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.innerText = opt;
                optsGrid.appendChild(optDiv);
            });

            bodyDiv.appendChild(textDiv);
            bodyDiv.appendChild(optsGrid);

            // 橫向並排載入卡片
            card.appendChild(numDiv);
            card.appendChild(flagBtn);
            card.appendChild(ansDiv);
            card.appendChild(bodyDiv);

            listContainer.appendChild(card);
        });

        updateCounter();
    }

    // 切換旗標儲存狀態
    function toggleFlag(id) {
        const index = flaggedQuestions.indexOf(id);
        if (index > -1) {
            flaggedQuestions.splice(index, 1);
        } else {
            flaggedQuestions.push(id);
        }
        saveFlaggedList('flagged_chapter29', flaggedQuestions);
        renderQuestions();
    }

    // 更新即時標記題數
    function updateCounter() {
        document.getElementById('flag-counter').innerText = `已標記題數：${flaggedQuestions.length} / ${questionsData.length}`;
    }

    // 切換全部與弱點篩選
    function filterQuestions(filterType) {
        currentFilter = filterType;
        document.getElementById('btn-all').classList.toggle('active', filterType === 'all');
        document.getElementById('btn-flagged').classList.toggle('active', filterType === 'flagged');
        renderQuestions();
    }

    window.onload = renderQuestions;
</script>

</body>
</html>
