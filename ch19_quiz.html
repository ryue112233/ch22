    id: 50,
    text: "A ________ will increase the number of shares outstanding without affecting the book value of any of the owners' equity account values.",
    options: ["A) special dividend", "B) stock split", "C) share repurchase", "D) tender offer", "E) liquidating dividend"],
    answer: "B"
  },
  {
    id: 51,
    text: "In a reverse stock split the:",
    options: ["A) number of shares outstanding increases and the owners' equity decreases.", "B) firm buys back existing shares of stock on the open market.", "C) firm sells new shares of stock on the open market.", "D) number of shares outstanding decreases while the book value of owners' equity is unchanged.", "E) shareholders make a cash payment to the firm."],
    answer: "D"
  }
];

let currentFilter = 'all';
let flagged = JSON.parse(localStorage.getItem('ch19_flagged') || '[]');

function saveFlagged() {
  localStorage.setItem('ch19_flagged', JSON.stringify(flagged));
}

function updateFlagCount() {
  document.getElementById('flagCount').textContent = flagged.length;
}

function toggleFlag(id) {
  const idx = flagged.indexOf(id);
  if (idx === -1) flagged.push(id);
  else flagged.splice(idx, 1);
  saveFlagged();
  updateFlagCount();
  const card = document.querySelector(`.q-card[data-id="${id}"]`);
  if (card) {
    card.classList.toggle('flagged', flagged.includes(id));
    applyFilter(card, id);
  }
}

function applyFilter(card, id) {
  if (currentFilter === 'flagged') {
    card.dataset.hidden = !flagged.includes(id);
  } else {
    card.dataset.hidden = false;
  }
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  let anyVisible = false;
  document.querySelectorAll('.q-card').forEach(card => {
    const id = parseInt(card.dataset.id);
    const hidden = f === 'flagged' && !flagged.includes(id);
    card.dataset.hidden = hidden;
    if (!hidden) anyVisible = true;
  });
  document.getElementById('emptyState').classList.toggle('visible', !anyVisible && f === 'flagged');
}

function renderQuestions() {
  const list = document.getElementById('questionList');
  list.innerHTML = '';
  questions.forEach(q => {
    const isFlagged = flagged.includes(q.id);
    const card = document.createElement('div');
    card.className = 'q-card' + (isFlagged ? ' flagged' : '');
    card.dataset.id = q.id;
    card.dataset.hidden = false;

    const optionsHTML = q.options.map(o => {
      const letter = o[0];
      const rest = o.slice(2).trim();
      return `<div class="q-option"><span class="opt-letter">${letter})</span>${rest}</div>`;
    }).join('');

    card.innerHTML = `
      <div class="q-top">
        <button class="flag-btn" onclick="toggleFlag(${q.id})" title="標記為容易出錯">🚩</button>
        <div class="q-num">Q${String(q.id).padStart(2,'0')}</div>
        <div class="q-answer-wrap">
          <span class="q-answer" title="滑鼠移至此處或反白查看答案">${q.answer}</span>
        </div>
        <div class="q-text">${q.text.replace(/\n/g, '<br>')}</div>
        <span class="flag-tag">容易出錯</span>
      </div>
      <div class="q-divider" style="margin-top:10px;"></div>
      <div class="q-options">${optionsHTML}</div>
    `;
    list.appendChild(card);
  });
  updateFlagCount();
}

renderQuestions();
</script>
</body>
</html>
