const STORAGE_KEY_26 = 'ch26_flags';

function readPersistentValue(storageKey) {
  try {
    const localValue = localStorage.getItem(storageKey);
    if (localValue !== null) return localValue;
  } catch (error) {}

  try {
    const sessionValue = sessionStorage.getItem(storageKey);
    if (sessionValue !== null) return sessionValue;
  } catch (error) {}

  try {
    const windowNameData = JSON.parse(window.name || '{}');
    if (windowNameData && Object.prototype.hasOwnProperty.call(windowNameData, storageKey)) {
      return windowNameData[storageKey];
    }
  } catch (error) {}

  return '[]';
}

function writePersistentValue(storageKey, serializedValue) {
  try {
    localStorage.setItem(storageKey, serializedValue);
    return;
  } catch (error) {}

  try {
    sessionStorage.setItem(storageKey, serializedValue);
    return;
  } catch (error) {}

  try {
    const windowNameData = JSON.parse(window.name || '{}');
    windowNameData[storageKey] = serializedValue;
    window.name = JSON.stringify(windowNameData);
  } catch (error) {}
}

function loadFlaggedList(storageKey) {
  try {
    const parsedValue = JSON.parse(readPersistentValue(storageKey));
    return Array.isArray(parsedValue) ? parsedValue : [];
  } catch (error) {
    return [];
  }
}

function saveFlaggedList(storageKey, values) {
  writePersistentValue(storageKey, JSON.stringify(values));
}

let flags = loadFlaggedList(STORAGE_KEY_26);
let currentFilter = 'all';

function saveFlags() { saveFlaggedList(STORAGE_KEY_26, flags); }

function updateFlagCount() {
  document.getElementById('flagCount').textContent = flags.length;
}

function toggleFlag(num) {
  const idx = flags.indexOf(num);
  if (idx === -1) flags.push(num); else flags.splice(idx, 1);
  saveFlags(); updateFlagCount();
  const card = document.querySelector(`.q-card[data-num="${num}"]`);
  if (card) {
    card.classList.toggle('flagged', flags.includes(num));
    if (currentFilter === 'flagged' && !flags.includes(num)) {
      card.classList.add('hidden-by-filter');
      checkEmpty();
    }
  }
}

function filterQuestions(type) {
  currentFilter = type;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && type === 'all') || (i === 1 && type === 'flagged'));
  });
  document.querySelectorAll('.q-card').forEach(card => {
    const num = parseInt(card.dataset.num);
    if (type === 'flagged') card.classList.toggle('hidden-by-filter', !flags.includes(num));
    else card.classList.remove('hidden-by-filter');
  });
  checkEmpty();
}

function checkEmpty() {
  const visible = document.querySelectorAll('.q-card:not(.hidden-by-filter)').length;
  document.getElementById('emptyState').classList.toggle('visible', visible === 0 && currentFilter === 'flagged');
}

function renderQuestions() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  questions.forEach(q => {
    const isFlagged = flags.includes(q.num);
    const opts = Object.entries(q.options);
    const optHtml = opts.map(([k, v]) =>
      `<div class="opt"><span class="opt-key">${k})</span> <span>${v}</span></div>`
    ).join('');
    const card = document.createElement('div');
    card.className = `q-card${isFlagged ? ' flagged' : ''}`;
    card.dataset.num = q.num;
    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${q.num}.</div>
        <div class="q-answer" title="Hover to reveal answer">${q.answer}</div>
        <button class="flag-btn" onclick="toggleFlag(${q.num})" title="標記此題">🚩</button>
        <div class="q-text">${q.text.replace(/\n/g,'<br>')}</div>
        <div class="flagged-label">已標記</div>
      </div>
      <div class="q-options">${optHtml}</div>
      <div class="q-divider"></div>
      <div class="q-meta">${q.section}</div>
    `;
    container.appendChild(card);
  });
  updateFlagCount();
}

renderQuestions();
</script>
